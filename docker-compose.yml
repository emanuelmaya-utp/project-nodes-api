services:
  mysql:
    image: mysql:8.0
    container_name: mysql-utp
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$DB_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build: .
    container_name: utp-api
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
